name: Build and deploy Python app to Azure Web App - bank-tahlil-dashboard

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python version
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Create virtual environment and install dependencies
        run: |
          python -m venv antenv
          source antenv/bin/activate
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build frontend (React)
        run: |
          cd frontend
          npm install
          npm run build -- --base=/static/
          mkdir -p ../backend/static
          cp -r dist/* ../backend/static/
                
      - name: Upload artifact for deployment jobs
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          path: .

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write 
      contents: read 

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: python-app
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_16A0C43B8C5B4D058B34822D2FBD6B5F }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_BBD98FE073A44DE7AF8CF4D43D642102 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_9BDB432F6A5F4AA5A1F02ABAC9E5EA57 }}

      - name: 'Deploy to Azure Web App'
        uses: azure/webapps-deploy@v3
        id: deploy-to-webapp
        with:
          app-name: 'bank-tahlil-dashboard'
          slot-name: 'Production'

